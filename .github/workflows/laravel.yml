name: Laravel Deployment

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, bcmath, intl, pdo_sqlite
        coverage: none

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Check Code Style (Laravel Pint)
      run: composer install && ./vendor/bin/pint --test || true # Running it but continuing even if it fails for now

    - name: Deploy to cPanel via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT || 22 }}
        script: |
          export PATH="$PATH:/usr/local/bin:/usr/bin"
          cd "/home/sites/20a/6/60b6f7d62d/public_html/vestanest" && \
          git pull origin main && \
          composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev && \
          php artisan migrate --force && \
          php artisan optimize && \
          php artisan view:cache && \
          php artisan event:cache && \
          npm install && \
          npm run build && \
          php artisan up
